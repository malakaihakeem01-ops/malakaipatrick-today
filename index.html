<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>malakaipatrick.today</title>
<link href="https://fonts.googleapis.com/css2?family=Anton&family=DM+Serif+Display:ital@0;1&family=Space+Mono:ital,wght@0,400;0,700;1,400&family=Unbounded:wght@400;700;900&display=swap" rel="stylesheet">
<style>
:root {
  --red: #E8192C; --blue: #0033CC; --yellow: #FFD600; --black: #0A0A0A; --white: #FAFAF5; --off: #F0EFE8;
}
* { margin: 0; padding: 0; box-sizing: border-box; }
body { background: var(--white); color: var(--black); font-family: 'Space Mono', monospace; overflow-x: hidden; cursor: none; }

/* Mobile Cursor Fix */
@media (hover: none) and (pointer: coarse) {
  .cursor-star { display: none !important; }
  body, a, button, .blog-main, .wish-card, .log-card, .mood, .hero-card { cursor: auto !important; }
}

.cursor-star {
  position: fixed; top: 0; left: 0; width: 28px; height: 28px; pointer-events: none; z-index: 999999;
  transform: translate(-50%, -50%); transition: transform 0.15s ease;
}
.cursor-star svg { width: 100%; height: 100%; }

/* --- NAVIGATION --- */
nav {
  display: grid; grid-template-columns: auto 1fr auto; align-items: center; padding: 0 36px; height: 52px;
  border-bottom: 3px solid var(--black); position: sticky; top: 0; background: var(--white); z-index: 200;
}
.nav-logo { font-family: 'Anton', sans-serif; font-size: 1.6rem; letter-spacing: 0.1em; color: var(--black); text-decoration: none; }
.nav-logo span { color: var(--red); }
.nav-links { display: flex; justify-content: center; gap: 32px; list-style: none; }
.nav-links a { font-size: 0.6rem; letter-spacing: 0.2em; text-transform: uppercase; text-decoration: none; color: var(--black); }
.nav-issue { font-size: 0.55rem; letter-spacing: 0.12em; text-transform: uppercase; color: #999; text-align: right; }

/* --- HERO --- */
.hero { display: grid; grid-template-columns: 1fr 1fr; min-height: 86vh; border-bottom: 3px solid var(--black); }
.hero-left { padding: 56px 52px; display: flex; flex-direction: column; justify-content: space-between; border-right: 3px solid var(--black); }
.hero-title { font-family: 'Anton', sans-serif; font-size: clamp(5rem, 10vw, 9rem); line-height: 0.88; text-transform: uppercase; }
.hero-card { padding: 44px; position: relative; overflow: hidden; border-bottom: 3px solid var(--black); transition: filter 0.2s; cursor: pointer; }
.hero-card.music { background: var(--blue); color: var(--white); }
.hero-card.wish { background: var(--yellow); color: var(--black); }

/* --- GAME SECTION --- */
.game-section { border-bottom: 3px solid var(--black); background: var(--black); padding: 48px; text-align: center; }
#game-canvas { border: 3px solid var(--yellow); background: #111; max-width: 100%; display: block; margin: 20px auto; cursor: crosshair; }
.game-btn { font-family: 'Anton', sans-serif; padding: 14px 36px; background: var(--yellow); border: none; cursor: pointer; }

/* --- SHARED STYLES --- */
.sec-head { display: flex; align-items: baseline; gap: 18px; padding: 32px 48px 20px; border-bottom: 2px solid var(--black); }
.sec-title { font-family: 'Anton', sans-serif; font-size: 2.4rem; text-transform: uppercase; }
.track-list { list-style: none; padding: 20px; }
.track-list li { display: flex; justify-content: space-between; padding: 10px 0; border-bottom: 1px solid rgba(0,0,0,0.07); font-size: 0.8rem; }
</style>
</head>
<body>

<nav>
  <a class="nav-logo" href="#">KAI<span>.</span>TODAY</a>
  <div style="flex:1;"></div>
  <span class="nav-issue">Vol. 01 — Spring 2026</span>
</nav>

<section class="hero">
  <div class="hero-left">
    <h1 class="hero-title">WHAT I'M<br><span style="color:var(--red)">INTO</span><br>RIGHT<br>NOW.</h1>
    <p style="font-size:0.6rem; color:#bbb;">Week of March 28, 2026 — Lincoln, NE</p>
  </div>
  <div class="hero-right">
    <div class="hero-card music">
      <p style="font-size:0.6rem; opacity:0.7;">🎵 NOW PLAYING</p>
      <p class="card-title" id="hero-music-title">Loading Spotify...</p>
    </div>
    <div class="hero-card wish">
      <p style="font-size:0.6rem; opacity:0.7;">📰 LATEST NEWS</p>
      <p class="card-title" id="news-headline">Fetching headlines...</p>
    </div>
  </div>
</section>

<section id="music">
  <div class="sec-head">
    <h2 class="sec-title">What I'm Listening To</h2>
  </div>
  <div style="padding: 40px;">
    <div id="now-playing-block" style="display:flex; gap:20px; align-items:center; background:var(--off); padding:20px; border:2px solid var(--black);">
      <div id="np-art" style="width:100px; height:100px; background:var(--yellow); border:2px solid var(--black); overflow:hidden;"></div>
      <div>
        <p id="np-status" style="color:var(--red); font-size:0.7rem; font-weight:bold;">OFFLINE</p>
        <h3 id="np-title" style="font-family:'Anton'; font-size:1.5rem;">---</h3>
        <p id="np-artist" style="color:#666;">---</p>
      </div>
    </div>
  </div>
</section>

<section class="game-section">
  <h2 style="color:white; font-family:'Anton'; font-size:2rem; margin-bottom:10px;">QUICK DRAW</h2>
  <div style="color:var(--yellow); margin-bottom:10px;">
    SCORE: <span id="game-score">000</span> | LIVES: <span id="game-lives">🤠 🤠 🤠</span>
  </div>
  <canvas id="game-canvas" width="700" height="300"></canvas>
  <button class="game-btn" onclick="startGame()" id="game-start-btn">DRAW, PARTNER</button>
</section>

<div class="cursor-star" id="cursor-star">
  <svg viewBox="0 0 51 48"><path d="M25.5 2 L31.5 18 L49 18 L35 29 L40 46 L25.5 36 L11 46 L16 29 L2 18 L19.5 18 Z" fill="#E8192C" stroke="#0A0A0A" stroke-width="2"/></svg>
</div>

<script>
/* --- SPOTIFY LOGIC --- */
async function loadSpotify() {
  try {
    const res = await fetch('/.netlify/functions/spotify');
    const data = await res.json();
    if (data.isPlaying) {
      document.getElementById('np-status').textContent = '● NOW PLAYING';
      document.getElementById('np-title').textContent = data.title;
      document.getElementById('np-artist').textContent = data.artist;
      document.getElementById('hero-music-title').textContent = `${data.title} — ${data.artist}`;
      if (data.albumArt) {
        document.getElementById('np-art').innerHTML = `<img src="${data.albumArt}" style="width:100%">`;
      }
    }
  } catch(e) { console.log("Spotify Fetch Error", e); }
}
setInterval(loadSpotify, 5000);
loadSpotify();

/* --- GAME LOGIC --- */
let score = 0, lives = 3, gameActive = false, cans = [];
const canvas = document.getElementById('game-canvas'), ctx = canvas.getContext('2d');

function startGame() {
  if (gameActive) return;
  score = 0; lives = 3; cans = []; gameActive = true;
  document.getElementById('game-start-btn').style.display = 'none';
  spawnCan();
  requestAnimationFrame(gameLoop);
}

function spawnCan() {
  if (!gameActive) return;
  cans.push({ x: Math.random() * (canvas.width - 40), y: -50, speed: 2 + Math.random() * 2 });
  setTimeout(spawnCan, 1200);
}

function gameLoop() {
  if (!gameActive) return;
  ctx.clearRect(0, 0, canvas.width, canvas.height);
  cans.forEach((can, i) => {
    can.y += can.speed;
    ctx.fillStyle = "#FFD600";
    ctx.fillRect(can.x, can.y, 30, 45);
    if (can.y > canvas.height) {
      cans.splice(i, 1);
      lives--;
      document.getElementById('game-lives').textContent = "🤠 ".repeat(Math.max(0, lives));
    }
  });
  if (lives <= 0) {
    gameActive = false;
    alert("Game Over! Score: " + score);
    document.getElementById('game-start-btn').style.display = 'inline-block';
  } else { requestAnimationFrame(gameLoop); }
}

canvas.addEventListener('mousedown', (e) => {
  const rect = canvas.getBoundingClientRect();
  const x = e.clientX - rect.left, y = e.clientY - rect.top;
  cans.forEach((can, i) => {
    if (x > can.x && x < can.x + 30 && y > can.y && y < can.y + 45) {
      cans.splice(i, 1); score += 10;
      document.getElementById('game-score').textContent = score.toString().padStart(3, '0');
    }
  });
});

/* --- CURSOR LOGIC --- */
const star = document.getElementById('cursor-star');
document.addEventListener('mousemove', e => {
  star.style.top = e.clientY + 'px';
  star.style.left = e.clientX + 'px';
});
</script>
</body>
</html>
